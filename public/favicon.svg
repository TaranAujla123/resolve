<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!--
    Resolve favicon.
    Deep navy rounded square + white "R" monogram + sage emerald
    accent dot bottom-right (mirrors the period in the "Resolve."
    wordmark). The R is set in a confident sans with tight tracking
    so it reads cleanly even at 16x16.
  -->
  <rect width="64" height="64" rx="12" fill="#0A1F44"/>
  <text
    x="32"
    y="46"
    font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="42"
    fill="#FFFFFF"
    font-weight="700"
    text-anchor="middle"
    letter-spacing="-0.02em"
  >R</text>
  <circle cx="46" cy="46" r="4.5" fill="#1F8B5A"/>
</svg>
