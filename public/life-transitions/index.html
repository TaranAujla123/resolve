<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    Legacy URL redirect stub.

    /life-transitions/ was renamed to /time-sensitive-sales/ on
    2026-06-06. This static HTML file is served by GitHub Pages for
    any hard-loaded request to the old path (bookmarks, shared links,
    crawler hits from the previous sitemap).

    Three redirect layers (any one is enough; all three for belt
    and suspenders):
      1. <link rel="canonical"> tells search engines the new URL is
         the canonical one for this content.
      2. <meta http-equiv="refresh"> fires on every browser.
      3. window.location.replace runs first when JS is available
         (faster, and replace() means the old URL doesn't pollute
         the history stack).
  -->
  <meta name="robots" content="noindex,nofollow" />
  <title>Redirecting to Time-Sensitive Sales · Resolve</title>
  <link rel="canonical" href="https://www.resolverealestate.ca/time-sensitive-sales/" />
  <meta http-equiv="refresh" content="0; url=/time-sensitive-sales/" />
  <script>
    window.location.replace('/time-sensitive-sales/');
  </script>
  <style>
    body {
      margin: 0;
      padding: 4rem 1.5rem;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #F5F1E8;
      color: #051A2C;
      text-align: center;
    }
    a { color: #051A2C; }
  </style>
</head>
<body>
  <p>
    This page has moved. If you are not redirected automatically,
    <a href="/time-sensitive-sales/">continue to Time-Sensitive Sales</a>.
  </p>
</body>
</html>
