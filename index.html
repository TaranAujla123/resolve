<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A1F44" />

    <!--
      Meta (Facebook) domain verification for resolveproperty.ca
      (Primegate Realty business portfolio; dataset/Pixel 26914854838125099).
      Needed for Aggregated Event Measurement. See workers/meta-capi/README.md.
    -->
    <meta name="facebook-domain-verification" content="o0my165yag0yyuumym1ye4b8ncyffi" />

    <!--
      Per-route SEO (title, description, canonical, OG, Twitter, JSON-LD,
      robots, author) is owned by <Seo /> via react-helmet-async, so the
      home page and /buyers each get their own correct head when
      prerendered. Only static / non-SEO head content lives here in the
      source index.html.

      Fallback <title> below covers two edge cases:
        - Dev mode (`npm run dev`), before React mounts and Helmet hydrates.
        - Any non-prerendered request (should not happen on GH Pages once
          the post-build prerender step has run).
      Once Helmet mounts it overrides this title with the per-route value.
    -->
    <title>Resolve · Seller Representation · Ontario</title>

    <!-- Favicons (?v query forces refetch when the mark changes) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=2" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Poppins:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <script type="text/javascript">
      // Decode the SPA redirect that 404.html performs. Runs BEFORE React
      // mounts so React Router sees the correct path.
      // MIT License (rafgraph/spa-github-pages)
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) { return s.replace(/~and~/g, '&') })
            .join('?');
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!--
      Cloudflare Web Analytics (privacy-first, no cookies, no banner).
      Site is configured under Taran@primegaterealty.com's Cloudflare
      account, analytics-only (no DNS proxy required). Mirrors the
      same setup used on prime-gate.ca.
    -->
    <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "f1a214de01d94341a1ed50bcb18ecc32"}'></script>
  </body>
</html>
