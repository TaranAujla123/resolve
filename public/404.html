<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Resolve · Seller Representation · HomeLife G1 Realty Inc., Brokerage</title>
    <script>
      // Single Page Apps for GitHub Pages
      // MIT License (rafgraph/spa-github-pages)
      // Redirects any deep path (e.g. /buyers) through index.html so
      // React Router can take over without a server-side 404.
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
