name = "meta-capi"
main = "src/index.js"
compatibility_date = "2024-09-01"

# CONFIRMED: resolveproperty.ca DNS is on GoDaddy (ns71/ns72.domaincontrol.com)
# and the site is on GitHub Pages, so same-origin routing is NOT available.
# Deploy to the default *.workers.dev URL and point the site's
# VITE_META_CAPI_ENDPOINT GitHub Secret at that full URL. The Worker already
# returns CORS headers for resolveproperty.ca, so the cross-origin POST works.
workers_dev = true

# -- Routing (same-origin alternative, NOT used) -------------------------
# Only possible if resolveproperty.ca were moved onto Cloudflare. Then you
# could route the Worker at the site origin (no CORS) and drop
# VITE_META_CAPI_ENDPOINT back to its default "/api/meta-capi":
#
# [[routes]]
# pattern = "resolveproperty.ca/api/meta-capi"
# zone_name = "resolveproperty.ca"

# -- Secrets (do NOT put values here; set them out of band) --------------
#   wrangler secret put META_PIXEL_ID
#   wrangler secret put META_CAPI_ACCESS_TOKEN
