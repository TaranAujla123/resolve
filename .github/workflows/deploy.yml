name: Build and deploy Resolve to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# One concurrent deploy at a time. Newer pushes cancel in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Puppeteer downloads a ~150MB Chromium on install. Cache it across
      # runs (keyed off the lockfile) so we do not pay that cost on every
      # CI build. The path is the Puppeteer default cache directory.
      - name: Cache Puppeteer Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-puppeteer-

      - name: Install
        run: npm ci

      # `npm run build` runs `vite build && node scripts/prerender.mjs`.
      # The prerender step boots a vite preview server, launches headless
      # Chromium, navigates to each route, and writes the post-Helmet HTML
      # to dist/<route>/index.html so each route ships with its own
      # title / meta / canonical / OG / JSON-LD.
      - name: Build (vite + prerender)
        run: npm run build
        env:
          VITE_META_CAPI_ENDPOINT: ${{ secrets.VITE_META_CAPI_ENDPOINT }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
